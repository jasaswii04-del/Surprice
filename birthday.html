<style>
*{
    margin:0;

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#ff4e8a,#7b2ff7);
}

/* Login Page */
#loginPage{
    text-align:center;

    padding:30px;
    border-radius:20px;

    width:350px;
}

/* Wish Page */
#wishPage{
    display:none;

    color:white;
    width:80%;
}

input{
    width:100%;
    padding:12px;
    border:none;
    border-radius:20px;
    margin:15px 0;
}

button{
    padding:12px 25px;
    border:none;
    border-radius:20px;
    cursor:pointer;
    background:white;
    color:#ff0080;
    font-weight:bold;
}

h1{
    margin-bottom:15px;
}

.message{
    font-size:20px;
    line-height:1.8;
    margin-bottom:20px;
}
</style>

<div id="loginPage">

```
<h1>🔒 Secret Birthday Portal</h1>

<input

<button onclick="checkPassword()">

```

</div>

<div id="wishPage">

```
<h1>🎂 Happy Birthday Bestie ❤️</h1>

function checkPassword(){

    let pass =
    document.getElementById("password").value;

    if(pass === "2004"){

        document.getElementById("loginPage").style.display = "none";

        document.getElementById("wishPage").style.display = "block";

    }else{

        alert("❌ Wrong Password");

    }
}

function playSong(){

    document.getElementById("song").play();

}

</script>
